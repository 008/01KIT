name: Build and publish electron app

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_for_linux:
    name: Build for linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: |
          rm -rf dist/
          corepack enable
          yarn install --frozen-lockfile
      - name: Build Linux binaries
        run: |
          yarn quasar build --mode electron --publish never -T linux --icon=/src-electron/icons/icon.png
      - name: Upload Linux installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itarmykit-linux
          compression-level: 0
          if-no-files-found: warn
          path: |
            dist/electron/Packaged/*.AppImage
            dist/electron/Packaged/*.deb
            dist/electron/Packaged/*.rpm
            dist/electron/Packaged/*.snap
            dist/electron/Packaged/*.blockmap
            dist/electron/Packaged/latest*.yml
  build_for_windows_x64:
    name: Build for windows
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile
      - name: Download VC++ Redistributables
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.arm64.exe" -OutFile "vc_redist.arm64.exe"
          if (!(Test-Path "vc_redist.x64.exe")) { throw "vc_redist.x64.exe download failed" }
          if (!(Test-Path "vc_redist.arm64.exe")) { throw "vc_redist.arm64.exe download failed" }
      - name: Build Windows binaries
        run: |
          yarn quasar build --mode electron --publish never -T win32 --icon=/src-electron/icons/icon.ico
      - name: Upload Windows installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itarmykit-windows
          compression-level: 0
          if-no-files-found: warn
          path: |
            dist/electron/Packaged/*.exe
            dist/electron/Packaged/*.msi
            dist/electron/Packaged/*.nsis.7z
            dist/electron/Packaged/*.blockmap
            dist/electron/Packaged/latest*.yml
  build_for_macos_14:
    name: Build for MacOS-14
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: |
          rm -rf dist/
          corepack enable
          yarn install --frozen-lockfile
      - name: dmg-license add
        run: |
          sudo npm install -g dmg-license
      - name: Build MacOS-14 binaries
        run: |
          yarn quasar build --mode electron --publish never -T darwin --icon=/src-electron/icons/icon.icns
      - name: Upload MacOS installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itarmykit-macos
          compression-level: 0
          if-no-files-found: warn
          path: |
            dist/electron/Packaged/*.dmg
            dist/electron/Packaged/*.zip
            dist/electron/Packaged/*.pkg
            dist/electron/Packaged/*.blockmap
            dist/electron/Packaged/latest*.yml

